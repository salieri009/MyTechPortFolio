name: Deploy to AKS

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'k8s/**'
      - '.github/workflows/deploy-aks.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  NAMESPACE: portfolio

jobs:
  # ===== Build and Test =====
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Start MongoDB for tests
      run: |
        docker run -d --name mongo-test -p 27017:27017 --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })' --quiet" --health-interval=5s --health-timeout=5s --health-retries=20 mongo:7
        for i in {1..30}; do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' mongo-test)
          if [ "$STATUS" = "healthy" ]; then
            echo "MongoDB is healthy"
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "MongoDB did not become healthy in time"
            docker logs mongo-test
            exit 1
          fi
          sleep 2
        done

    - name: Run Backend Tests
      working-directory: ./backend
      run: |
        chmod +x gradlew
        ./gradlew test --no-daemon
      env:
        SPRING_PROFILES_ACTIVE: test
        MONGODB_URI: mongodb://localhost:27017/portfolio_test

    - name: Run Frontend Tests
      working-directory: ./frontend
      run: |
        npm ci
        npm run test:ci

  # ===== Build and Push Docker Images =====
  build-push-images:
    name: Build & Push Images
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.AZURE_CONTAINER_REGISTRY }}
        username: ${{ secrets.AZURE_ACR_USERNAME }}
        password: ${{ secrets.AZURE_ACR_PASSWORD }}

    - name: Build and Push Backend Image
      run: |
        docker build \
          -t ${{ env.AZURE_CONTAINER_REGISTRY }}/portfolio-backend:${{ github.sha }} \
          -t ${{ env.AZURE_CONTAINER_REGISTRY }}/portfolio-backend:latest \
          ./backend
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/portfolio-backend:${{ github.sha }}
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/portfolio-backend:latest

    - name: Build and Push Frontend Image
      run: |
        docker build \
          -t ${{ env.AZURE_CONTAINER_REGISTRY }}/portfolio-frontend:${{ github.sha }} \
          -t ${{ env.AZURE_CONTAINER_REGISTRY }}/portfolio-frontend:latest \
          --build-arg VITE_API_BASE_URL=/api \
          --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
          --build-arg VITE_GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }} \
          --build-arg VITE_GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }} \
          --build-arg VITE_USE_BACKEND_API=true \
          ./frontend
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/portfolio-frontend:${{ github.sha }}
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/portfolio-frontend:latest

  # ===== Deploy to AKS =====
  deploy:
    name: Deploy to AKS
    needs: build-push-images
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS Context
      uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
        cluster-name: ${{ env.AKS_CLUSTER_NAME }}

    - name: Create Namespace (if not exists)
      run: |
        kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Create/Update Secrets
      run: |
        kubectl create secret generic portfolio-secrets \
          --namespace=${{ env.NAMESPACE }} \
          --from-literal=MONGODB_URI='${{ secrets.MONGODB_URI }}' \
          --from-literal=GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}' \
          --from-literal=GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}' \
          --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Update Image Tags in Manifests
      run: |
        sed -i "s|\${ACR_NAME}|${{ env.AZURE_CONTAINER_REGISTRY }}|g" k8s/all-in-one.yaml
        sed -i "s|:latest|:${{ github.sha }}|g" k8s/all-in-one.yaml

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/all-in-one.yaml

    - name: Wait for Rollout
      run: |
        kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=300s
        kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=300s

    - name: Verify Deployment
      run: |
        echo "=== Pods ==="
        kubectl get pods -n ${{ env.NAMESPACE }}
        echo "=== Services ==="
        kubectl get services -n ${{ env.NAMESPACE }}
        echo "=== Ingress ==="
        kubectl get ingress -n ${{ env.NAMESPACE }}

    - name: Run Smoke Tests
      run: |
        # Get Ingress IP
        INGRESS_IP=$(kubectl get ingress portfolio-ingress -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        echo "Ingress IP: $INGRESS_IP"
        
        # Wait for endpoints
        sleep 30
        
        # Test health endpoint
        curl -f http://$INGRESS_IP/actuator/health || echo "Health check pending..."
      continue-on-error: true

  # ===== Rollback on Failure =====
  rollback:
    name: Rollback (on failure)
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS Context
      uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
        cluster-name: ${{ env.AKS_CLUSTER_NAME }}

    - name: Rollback Backend
      run: |
        kubectl rollout undo deployment/backend -n ${{ env.NAMESPACE }}
        kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=300s

    - name: Rollback Frontend
      run: |
        kubectl rollout undo deployment/frontend -n ${{ env.NAMESPACE }}
        kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=300s
