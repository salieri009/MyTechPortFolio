# ========================================
# TEST PROFILE
# ========================================

# Use dedicated test database. CI can override with MONGODB_URI.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/portfolio_test}
spring.data.mongodb.database=portfolio_test
spring.data.mongodb.auto-index-creation=true

# Keep API paths aligned with integration tests.
server.servlet.context-path=

# Test-safe secrets and OAuth placeholders.
app.jwt.secret=${JWT_SECRET:testSecretKey1234567890123456789012345678901234567890}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:test-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:test-google-client-secret}

# Disable side effects in test execution.
app.email.enabled=false

# Expose prometheus in tests to assert it stays protected by Spring Security.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator

# Keep logs concise in CI.
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.com.mytechfolio.portfolio=INFO